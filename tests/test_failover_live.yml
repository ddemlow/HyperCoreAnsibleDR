---
# tests/test_failover_live.yml
#
# Live integration test for DR failover workflow.
#
# Requirements:
#   - inventory has two groups: source and dr (or one host per group)
#   - source cluster has a remote cluster configured for dr
#   - scale_user/scale_pass set in inventory / vault
#
# Run with:
#   ansible-playbook tests/test_failover_live.yml -i inventory/inventory.yml
#
# Optional extra-vars:
#   source_cluster_name: (name of the connection on DR that identifies source cluster)
#   dr_exclude_tag: (tag name used by automated_dr_failover to skip VMs; default dr-exclude)
#   http_check_host: (optional app endpoint to prevent failover when alive)
#   http_check_port: (default 80)
#
# Note: Test can be run with pre-existing VMs and replication already set up.
# Use --start-at-task to skip initial setup if VMs/replication exist.

- name: "DR failover live integration test - pre-flight: ensure source cluster connectivity"
  hosts: dr
  connection: local
  gather_facts: false

  tasks:
    - name: "Pre-flight: discover source cluster node VMs on host cluster"
      scale_computing.hypercore.vm_info:
        cluster_instance:
          host: "{{ host_cluster.host }}"
          username: "{{ host_cluster.username }}"
          password: "{{ host_cluster.password }}"
      register: host_cluster_vms
      when: auto_disconnect | bool

    - name: "Pre-flight: filter to source cluster node VMs"
      ansible.builtin.set_fact:
        source_node_vms: >-
          {{ host_cluster_vms.records
             | selectattr('vm_name', 'match', '^' + (source_cluster_vm_name
                if (source_cluster_vm_name | default('') | length > 0)
                else hostvars[groups['source'][0]]['hypercore_cluster_name']) + '.*$')
             | list }}
      when: auto_disconnect | bool

    - name: "Pre-flight: reconnect NIC on each source cluster node VM (no-op if already connected)"
      ansible.builtin.uri:
        url: "{{ host_cluster.host }}/rest/v1/VirDomainNetDevice/{{ item.nics[0].uuid }}"
        method: PATCH
        url_username: "{{ host_cluster.username }}"
        url_password: "{{ host_cluster.password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          connected: true
        status_code: 200
      loop: "{{ source_node_vms | default([]) }}"
      loop_control:
        label: "{{ item.vm_name }}"
      when: auto_disconnect | bool and (source_node_vms | default([]) | length > 0)

    - name: "Pre-flight: wait for source cluster to be reachable"
      ansible.builtin.uri:
        url: "https://{{ groups['source'][0] }}/rest/v1/Cluster"
        url_username: "{{ hostvars[groups['source'][0]]['scale_user'] | default('admin') }}"
        url_password: "{{ hostvars[groups['source'][0]]['scale_pass'] | default('admin') }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
      register: source_reachable
      until: source_reachable.status == 200
      retries: 24
      delay: 5
      when: auto_disconnect | bool and (source_node_vms | default([]) | length > 0)

- name: "DR failover live integration test - pre-test cleanup: source cluster"
  hosts: source
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"

  tasks:
    - name: "Discover existing source test VMs"
      scale_computing.hypercore.vm_info:
      register: existing_source_vms

    - name: "Delete existing source test VMs"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.vm_name }}"
        state: absent
      loop: "{{ existing_source_vms.records | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$') | list }}"
      loop_control:
        label: "{{ item.vm_name }}"
      when: cleanup_previous_run | default(true) | bool

- name: "DR failover live integration test - pre-test cleanup: DR cluster"
  hosts: dr
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"

  tasks:
    - name: "Discover existing DR test VMs"
      scale_computing.hypercore.vm_info:
      register: existing_dr_vms

    - name: "Delete existing DR test VMs (replication targets and failover clones)"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.vm_name }}"
        state: absent
      loop: "{{ existing_dr_vms.records | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$') | list }}"
      loop_control:
        label: "{{ item.vm_name }}"
      when: cleanup_previous_run | default(true) | bool

- name: "DR failover live integration test - prepare source VMs and enable replication"
  hosts: source
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"
    dr_exclude_tag: "dr-exclude"
    failover_playbook_path: "{{ playbook_dir }}/../automated_dr_failover.yml"
    source_vms:
      - name: "dr-live-test-keep"
        tags: []
      - name: "dr-live-test-exclude"
        tags:
          - "dr-exclude"
    # note: use `remote_cluster_name` if you want an explicitly named remote cluster; otherwise first listed remote cluster is used
    remote_cluster_name: ""

  tasks:
    - name: "Discover remote DR cluster connection on source"
      scale_computing.hypercore.remote_cluster_info:
      register: source_remote_cluster_info

    - name: "Fail if no remote cluster connection is configured on source"
      ansible.builtin.fail:
        msg: "No remote cluster configured on source cluster; configure remote_cluster first."
      when: source_remote_cluster_info.records | length == 0

    - name: "Resolve target remote cluster name"
      ansible.builtin.set_fact:
        remote_cluster_name: >-
          {{ remote_cluster_name
             if remote_cluster_name | length > 0
             else source_remote_cluster_info.records[0].name }}

    - name: "Create and power on source test VMs"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.name }}"
        description: "DR failover live test source VM"
        state: present
        memory: "{{ '256 MB' | human_to_bytes }}"
        vcpu: 1
        operating_system: os_other
        disks:
          - type: virtio_disk
            disk_slot: 0
            size: "{{ '1 GB' | human_to_bytes }}"
        nics:
          - type: virtio
            vlan: 0
        boot_devices:
          - type: virtio_disk
            disk_slot: 0
        power_state: start
        tags: "{{ item.tags }}"
      loop: "{{ source_vms }}"
      register: created_source_vms

    - name: "Enable replication for source test VMs to target cluster"
      scale_computing.hypercore.vm_replication:
        vm_name: "{{ item.name }}"
        remote_cluster: "{{ remote_cluster_name }}"
        state: enabled
      loop: "{{ source_vms }}"
      register: source_replication


- name: "DR failover live integration test - verify source RPO and trigger DR playbook"
  hosts: dr
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"
    dr_exclude_tag: "dr-exclude"
    source_cluster_name: ""  # set to cluster name if desired
    http_check_host: ""      # set to non-empty to test http-check guard path
    http_check_port: 80
    # auto_disconnect and host_cluster come from inventory (dr group vars in test_inventory.yml).
    # Set auto_disconnect: true when the source cluster runs as a VM on a host cluster.
    # The test will disconnect/reconnect source node NICs automatically instead of
    # prompting the operator.  Override source_cluster_vm_name if the VM name on the
    # host cluster differs from the source inventory host's hypercore_cluster_name.
    source_cluster_vm_name: ""  # defaults to hypercore_cluster_name from source inventory

  tasks:
    - name: "Initialize test result tracking"
      ansible.builtin.set_fact:
        result_guard_check: "NOT RUN"
        result_failover: "NOT RUN"
        result_idempotency: "NOT RUN"
        result_planned_failover: "NOT RUN"
        result_planned_zero_rpo: "NOT RUN"

    - name: "Wait for replicated VMs to appear on DR target"
      scale_computing.hypercore.vm_info:
      register: dr_vm_info_poll
      until: >-
        (dr_vm_info_poll.records
         | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$')
         | selectattr('replication_source_vm_uuid', 'ne', '')
         | list | length) >= 2
      retries: 60
      delay: 10

    - name: "Set list of replicated DR test VMs"
      ansible.builtin.set_fact:
        replicated_dr_test_vms: >-
          {{ dr_vm_info_poll.records
             | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$')
             | selectattr('replication_source_vm_uuid', 'ne', '')
             | list }}

    - name: "Assert we have replicated VMs on DR"
      ansible.builtin.assert:
        that:
          - "replicated_dr_test_vms | length >= 2"
        fail_msg: "No replicated VMs found on DR cluster. Ensure source cluster replication is active and wait until replication_target VMs appear."
        success_msg: "Replicated VM(s) are visible on DR cluster."

    - name: "Wait for all VM replication to reach 100% on source cluster"
      ansible.builtin.uri:
        url: "https://{{ groups['source'][0] }}/rest/v1/VirDomainReplication"
        url_username: "{{ hostvars[groups['source'][0]]['scale_user'] | default('admin') }}"
        url_password: "{{ hostvars[groups['source'][0]]['scale_pass'] | default('admin') }}"
        force_basic_auth: true
        validate_certs: false
      register: replication_progress
      until: >-
        (replication_progress.json | length) >= (replicated_dr_test_vms | length) and
        (replication_progress.json | map(attribute='progress.percentComplete') | list | min) == 100
      retries: 120
      delay: 5

    - name: "Resolve source cluster VM name on host cluster"
      ansible.builtin.set_fact:
        resolved_source_vm_name: >-
          {{ source_cluster_vm_name
             if source_cluster_vm_name | length > 0
             else hostvars[groups['source'][0]]['hypercore_cluster_name'] }}
      when: auto_disconnect | bool

    - name: "Discover source cluster node VMs on host cluster"
      scale_computing.hypercore.vm_info:
        cluster_instance:
          host: "{{ host_cluster.host }}"
          username: "{{ host_cluster.username }}"
          password: "{{ host_cluster.password }}"
      register: host_cluster_vms
      when: auto_disconnect | bool

    - name: "Filter to source cluster node VMs by name prefix"
      ansible.builtin.set_fact:
        source_node_vms: >-
          {{ host_cluster_vms.records
             | selectattr('vm_name', 'match', '^' + resolved_source_vm_name + '.*$')
             | list }}
      when: auto_disconnect | bool

    - name: "Fail if no source cluster VMs found on host cluster"
      ansible.builtin.fail:
        msg: >-
          No VMs matching '{{ resolved_source_vm_name }}*' found on host cluster
          {{ host_cluster.host }}. Check host_cluster credentials and source_cluster_vm_name.
      when: auto_disconnect | bool and (source_node_vms | default([]) | length == 0)

    - name: "Guard check — run failover playbook while source is still online (must be a no-op)"
      block:
        - name: "Run failover playbook with source cluster reachable"
          ansible.builtin.shell: >-
            ansible-playbook {{ playbook_dir }}/../automated_dr_failover.yml
            -i {{ ansible_inventory_sources[0] }}
            -l {{ inventory_hostname }}
            -e "source_cluster_name={{ source_cluster_name }} dr_exclude_tag={{ dr_exclude_tag }} http_check_host={{ http_check_host }} http_check_port={{ http_check_port }}"
            -v
            2>&1 | tee /tmp/guard_run_test.log
          register: guard_run
          changed_when: false

        - name: "Show guard run stdout"
          ansible.builtin.debug:
            msg: "{{ guard_run.stdout }}"

        - name: "Get DR VMs after guard run"
          scale_computing.hypercore.vm_info:
          register: dr_info_after_guard

        - name: "Analyze guard run results"
          ansible.builtin.set_fact:
            guard_dr_vms: >-
              {{ dr_info_after_guard.records
                 | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*-DR$')
                 | list }}
            guard_exited_early: >-
              {{ 'ESTABLISHED' in guard_run.stdout or 'no failover needed' in guard_run.stdout | lower }}

        - name: "Fail if guard run cloned any VMs"
          ansible.builtin.fail:
            msg: >-
              GUARD CHECK FAILED: Failover playbook cloned {{ guard_dr_vms | length }} VM(s)
              while the source cluster was still reachable. It should have exited without
              making any changes.
          when: guard_dr_vms | length > 0

        - name: "Report guard check result"
          ansible.builtin.debug:
            msg: |
              ============================================
              GUARD CHECK RESULT: PASS
              ============================================
              Failover playbook exited without cloning any VMs while source
              cluster was online and replication connection was ESTABLISHED.
              ============================================

        - name: "Record guard check result"
          ansible.builtin.set_fact:
            result_guard_check: "PASS"

      rescue:
        - name: "Record guard check failure"
          ansible.builtin.set_fact:
            result_guard_check: "FAIL"
        - name: "Re-raise guard check failure"
          ansible.builtin.fail:
            msg: "Guard check failed — see output above."

    - name: "Simulate outage, run failover, and restore connectivity"
      block:
        - name: "Disconnect NIC on source cluster node VM to simulate outage"
          ansible.builtin.uri:
            url: "{{ host_cluster.host }}/rest/v1/VirDomainNetDevice/{{ source_node_vms[0].nics[0].uuid }}"
            method: PATCH
            url_username: "{{ host_cluster.username }}"
            url_password: "{{ host_cluster.password }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              connected: false
            status_code: 200
          when: auto_disconnect | bool

        - name: "Instruct operator to poweroff/disconnect source cluster before failover"
          ansible.builtin.pause:
            prompt: |-
              Simulate source outage now by powering off/disconnecting source cluster.
              Then press Enter to continue into automated failover.
          when: not (auto_disconnect | bool)

        - name: "Wait for remote cluster connection to be detected as disconnected"
          scale_computing.hypercore.remote_cluster_info:
          register: remote_cluster_status
          until: >-
            (remote_cluster_status.records
             | selectattr('connection_status', 'ne', 'ESTABLISHED')
             | list | length) > 0
          retries: 48
          delay: 5

        - name: "Run automated DR failover playbook"
          ansible.builtin.shell: >-
            ansible-playbook {{ playbook_dir }}/../automated_dr_failover.yml
            -i {{ ansible_inventory_sources[0] }}
            -l {{ inventory_hostname }}
            -e "source_cluster_name={{ source_cluster_name }} dr_exclude_tag={{ dr_exclude_tag }} http_check_host={{ http_check_host }} http_check_port={{ http_check_port }}"
            -v
            2>&1 | tee /tmp/failover_run_test.log
          register: failover_run
          changed_when: false

        - name: "Show failover playbook stdout"
          ansible.builtin.debug:
            msg: "{{ failover_run.stdout }}"

        - name: "Verify failover cloned DR VMs exist (happy path)"
          scale_computing.hypercore.vm_info:
          register: dr_info_after_failover

        - name: "Analyze failover results"
          ansible.builtin.set_fact:
            cloned_keep_vms: >-
              {{ dr_info_after_failover.records
                 | selectattr('vm_name', 'match', '^' + source_vm_prefix + '-keep.*-DR$')
                 | list }}
            cloned_exclude_vms: >-
              {{ dr_info_after_failover.records
                 | selectattr('vm_name', 'match', '^' + source_vm_prefix + '-exclude.*-DR$')
                 | list }}

        - name: "Report test results"
          ansible.builtin.debug:
            msg: |
              ============================================
              DR FAILOVER TEST RESULTS
              ============================================
              Expected clones: 1 ({{ source_vm_prefix }}-keep)
              Excluded VMs: 1 ({{ source_vm_prefix }}-exclude with tag '{{ dr_exclude_tag }}')

              Actual clones created: {{ cloned_keep_vms | length + cloned_exclude_vms | length }}
              - Keep VMs cloned: {{ cloned_keep_vms | length }} ({{ cloned_keep_vms | map(attribute='vm_name') | list | join(', ') | default('none') }})
              - Excluded VMs cloned: {{ cloned_exclude_vms | length }} ({{ cloned_exclude_vms | map(attribute='vm_name') | list | join(', ') | default('none') }})

              Test Status: {{ 'PASS' if (cloned_keep_vms | length >= 1 and cloned_exclude_vms | length == 0) else 'FAIL' }}
              ============================================

        - name: "Test evaluation"
          block:
            - name: "Fail test if excluded VMs were cloned"
              ansible.builtin.fail:
                msg: "TEST FAILED: Excluded VM(s) were cloned when they should have been skipped!"
              when: cloned_exclude_vms | length > 0

            - name: "Fail test if expected VMs were not cloned"
              ansible.builtin.fail:
                msg: "TEST FAILED: Expected VM(s) were not cloned!"
              when: cloned_keep_vms | length == 0

            - name: "Prompt user: test passed, ready for cleanup"
              ansible.builtin.pause:
                prompt: |-
                  TEST PASSED: DR failover worked correctly.
                  - Expected VM cloned: ✓
                  - Excluded VM properly skipped: ✓

                  Ready to clean up test VMs. Please reconnect/power on the source cluster now.
                  Then press Enter to continue with cleanup.
              when: not (auto_disconnect | bool)

            - name: "Test passed — auto-reconnect will follow"
              ansible.builtin.debug:
                msg: "TEST PASSED. Reconnecting source cluster NICs and proceeding to cleanup."
              when: auto_disconnect | bool

            - name: "Record failover result"
              ansible.builtin.set_fact:
                result_failover: "PASS"

        - name: "Idempotency check — re-run failover playbook with DR VMs already present"
          block:
            - name: "Re-run automated DR failover playbook (should be a no-op)"
              ansible.builtin.shell: >-
                ansible-playbook {{ playbook_dir }}/../automated_dr_failover.yml
                -i {{ ansible_inventory_sources[0] }}
                -l {{ inventory_hostname }}
                -e "source_cluster_name={{ source_cluster_name }} dr_exclude_tag={{ dr_exclude_tag }} http_check_host={{ http_check_host }} http_check_port={{ http_check_port }}"
                -v
                2>&1 | tee /tmp/idempotency_run_test.log
              register: idempotency_run
              changed_when: false

            - name: "Show idempotency run stdout"
              ansible.builtin.debug:
                msg: "{{ idempotency_run.stdout }}"

            - name: "Get DR VMs after idempotency re-run"
              scale_computing.hypercore.vm_info:
              register: dr_info_after_idempotency

            - name: "Analyze idempotency results"
              ansible.builtin.set_fact:
                cloned_keep_vms_after_rerun: >-
                  {{ dr_info_after_idempotency.records
                     | selectattr('vm_name', 'match', '^' + source_vm_prefix + '-keep.*-DR$')
                     | list }}
                idempotency_message_found: >-
                  {{ 'Failover has already run' in idempotency_run.stdout }}

            - name: "Fail if idempotency re-run cloned additional VMs"
              ansible.builtin.fail:
                msg: >-
                  IDEMPOTENCY FAILED: Re-running the failover playbook created additional
                  DR VM clones. Expected {{ cloned_keep_vms | length }}, found
                  {{ cloned_keep_vms_after_rerun | length }}.
              when: cloned_keep_vms_after_rerun | length != cloned_keep_vms | length

            - name: "Fail if idempotency message not found in output"
              ansible.builtin.fail:
                msg: >-
                  IDEMPOTENCY FAILED: Expected 'Failover has already run' message not found
                  in playbook output. The idempotency check may not have fired correctly.
              when: not idempotency_message_found

            - name: "Report idempotency result"
              ansible.builtin.debug:
                msg: |
                  ============================================
                  IDEMPOTENCY TEST RESULT: PASS
                  ============================================
                  Re-running failover playbook with DR VMs present produced no additional
                  clones and correctly reported: 'Failover has already run.'
                  ============================================

            - name: "Record idempotency result"
              ansible.builtin.set_fact:
                result_idempotency: "PASS"

          rescue:
            - name: "Record idempotency failure"
              ansible.builtin.set_fact:
                result_idempotency: "FAIL"
            - name: "Idempotency test failed — re-raise"
              ansible.builtin.fail:
                msg: "IDEMPOTENCY TEST FAILED. See output above."

      rescue:
        - name: "Prompt user: test failed, cleanup anyway?"
          ansible.builtin.pause:
            prompt: |-
              TEST FAILED: Issues detected (see output above).
              Do you want to run cleanup anyway? Please reconnect/power on the source cluster now.
              Then press Enter to continue with cleanup, or Ctrl+C to abort.
          when: not (auto_disconnect | bool)

        - name: "Test failed — auto-reconnect will follow"
          ansible.builtin.debug:
            msg: "TEST FAILED. See output above. Reconnecting source cluster NICs and proceeding to cleanup."
          when: auto_disconnect | bool

        - name: "Record failover failure"
          ansible.builtin.set_fact:
            result_failover: "FAIL"

      always:
        - name: "Reconnect NIC on source cluster node VM"
          ansible.builtin.uri:
            url: "{{ host_cluster.host }}/rest/v1/VirDomainNetDevice/{{ source_node_vms[0].nics[0].uuid }}"
            method: PATCH
            url_username: "{{ host_cluster.username }}"
            url_password: "{{ host_cluster.password }}"
            force_basic_auth: true
            validate_certs: false
            body_format: json
            body:
              connected: true
            status_code: 200
          when: auto_disconnect | bool

        - name: "Wait for remote cluster connection to be re-established"
          scale_computing.hypercore.remote_cluster_info:
          register: reconnect_status
          until: >-
            (reconnect_status.records
             | selectattr('connection_status', 'equalto', 'ESTABLISHED')
             | list | length) > 0
          retries: 24
          delay: 5
          when: auto_disconnect | bool

- name: "DR failover live integration test - planned failover test"
  hosts: dr
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"
    dr_vm_tag: "DR-failover"
    source_cluster_name: ""
    dr_exclude_tag: "dr-exclude"

  tasks:
    # ── Setup: clean up emergency failover clones so we get a fresh run ──────

    - name: "Planned test setup — remove DR failover clones from emergency test"
      scale_computing.hypercore.vm_info:
      register: dr_vms_pre_planned

    - name: "Planned test setup — delete DR failover clone VMs"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.vm_name }}"
        state: absent
      loop: >-
        {{ dr_vms_pre_planned.records
           | selectattr('tags', 'defined')
           | selectattr('tags', 'contains', dr_vm_tag)
           | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$')
           | list }}
      loop_control:
        label: "{{ item.vm_name }}"

    - name: "Planned test setup — wait for source replication to re-sync to 100%"
      ansible.builtin.uri:
        url: "https://{{ groups['source'][0] }}/rest/v1/VirDomainReplication"
        url_username: "{{ hostvars[groups['source'][0]]['scale_user'] | default('admin') }}"
        url_password: "{{ hostvars[groups['source'][0]]['scale_pass'] | default('admin') }}"
        force_basic_auth: true
        validate_certs: false
      register: pre_planned_replication
      until: >-
        (pre_planned_replication.json | length) >= 1 and
        (pre_planned_replication.json | map(attribute='progress.percentComplete') | list | min) == 100
      retries: 120
      delay: 5

    # ── Baseline: record snapshot counts before planned failover ─────────────

    - name: "Planned test — get DR replication target VMs"
      scale_computing.hypercore.vm_info:
      register: dr_vms_for_planned

    - name: "Planned test — filter to replication targets (non-tagged, have source UUID)"
      ansible.builtin.set_fact:
        planned_test_dr_targets: >-
          {{ dr_vms_for_planned.records
             | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$')
             | selectattr('replication_source_vm_uuid', 'ne', '')
             | rejectattr('tags', 'contains', dr_vm_tag)
             | list }}

    - name: "Planned test — record pre-run snapshot counts on DR targets"
      scale_computing.hypercore.vm_snapshot_info:
        vm_name: "{{ item.vm_name }}"
      register: planned_pre_snapshots
      loop: "{{ planned_test_dr_targets }}"
      loop_control:
        label: "{{ item.vm_name }}"

    - name: "Planned test — build pre-snapshot count map"
      ansible.builtin.set_fact:
        planned_pre_snapshot_counts: >-
          {{ planned_pre_snapshot_counts | default({})
             | combine({item.item.vm_name: item.records | length}) }}
      loop: "{{ planned_pre_snapshots.results }}"
      loop_control:
        label: "{{ item.item.vm_name }}"

    # ── Run planned failover ──────────────────────────────────────────────────

    - name: "Planned failover test"
      block:
        - name: "Run planned failover playbook (skip_operator_confirmation=true for automation)"
          ansible.builtin.shell: >-
            ansible-playbook {{ playbook_dir }}/../automated_dr_failover.yml
            -i {{ ansible_inventory_sources[0] }}
            -l {{ inventory_hostname }}
            -e "planned_failover=true skip_operator_confirmation=true source_cluster_name={{ source_cluster_name }} dr_exclude_tag={{ dr_exclude_tag }}"
            -v
            2>&1 | tee /tmp/planned_failover_test.log
          register: planned_run
          changed_when: false

        - name: "Show planned failover output"
          ansible.builtin.debug:
            msg: "{{ planned_run.stdout[-2000:] }}"

        # ── Assert: DR failover clone VMs were created ────────────────────────

        - name: "Get DR VMs after planned failover"
          scale_computing.hypercore.vm_info:
          register: dr_vms_after_planned

        - name: "Analyze planned failover clones"
          ansible.builtin.set_fact:
            planned_cloned_keep_vms: >-
              {{ dr_vms_after_planned.records
                 | selectattr('vm_name', 'match', '^' + source_vm_prefix + '-keep.*-DR$')
                 | list }}
            planned_cloned_exclude_vms: >-
              {{ dr_vms_after_planned.records
                 | selectattr('vm_name', 'match', '^' + source_vm_prefix + '-exclude.*-DR$')
                 | list }}

        - name: "Fail if planned failover did not clone expected VMs"
          ansible.builtin.fail:
            msg: >-
              PLANNED FAILOVER FAILED: Expected at least 1 clone of '{{ source_vm_prefix }}-keep'
              but found {{ planned_cloned_keep_vms | length }}.
          when: planned_cloned_keep_vms | length == 0

        - name: "Fail if excluded VM was cloned during planned failover"
          ansible.builtin.fail:
            msg: >-
              PLANNED FAILOVER FAILED: Excluded VM was cloned when it should have been skipped.
              Clones found: {{ planned_cloned_exclude_vms | map(attribute='vm_name') | list }}
          when: planned_cloned_exclude_vms | length > 0

        - name: "Record planned failover result: PASS"
          ansible.builtin.set_fact:
            result_planned_failover: "PASS"

        # ── Assert: source VMs are SHUTOFF (zero-RPO gate) ───────────────────

        - name: "Assert source VMs were shut down during planned failover"
          scale_computing.hypercore.vm_info:
            vm_name: "{{ item }}"
            cluster_instance:
              host: "https://{{ groups['source'][0] }}"
              username: "{{ hostvars[groups['source'][0]]['scale_user'] | default('admin') }}"
              password: "{{ hostvars[groups['source'][0]]['scale_pass'] | default('admin') }}"
          register: source_vm_states
          loop:
            - "{{ source_vm_prefix }}-keep"
            - "{{ source_vm_prefix }}-exclude"
          loop_control:
            label: "{{ item }}"

        - name: "Fail if any source VM is still RUNNING after planned failover"
          ansible.builtin.fail:
            msg: >-
              ZERO-RPO CHECK FAILED: Source VM '{{ item.item }}' is still
              {{ item.records[0].power_state | default('UNKNOWN') }} — expected SHUTOFF.
              Planned failover must have skipped the graceful shutdown step.
          loop: "{{ source_vm_states.results }}"
          loop_control:
            label: "{{ item.item }}"
          when:
            - item.records | length > 0
            - item.records[0].power_state != 'SHUTOFF'

        # ── Assert: shutdown snapshot appeared (zero-RPO proxy) ──────────────

        - name: "Get snapshot counts after planned failover"
          scale_computing.hypercore.vm_snapshot_info:
            vm_name: "{{ item.vm_name }}"
          register: planned_post_snapshots
          loop: "{{ planned_test_dr_targets }}"
          loop_control:
            label: "{{ item.vm_name }}"

        - name: "Fail if no new snapshot appeared after planned shutdown"
          ansible.builtin.fail:
            msg: >-
              ZERO-RPO CHECK FAILED: No new snapshot detected on DR target '{{ item.item.vm_name }}'
              after planned failover shutdown.
              Pre-run count: {{ planned_pre_snapshot_counts[item.item.vm_name] | default(0) }}
              Post-run count: {{ item.records | length }}
          loop: "{{ planned_post_snapshots.results }}"
          loop_control:
            label: "{{ item.item.vm_name }}"
          when: (item.records | length) <= (planned_pre_snapshot_counts[item.item.vm_name] | default(0) | int)

        - name: "Record planned zero-RPO result: PASS"
          ansible.builtin.set_fact:
            result_planned_zero_rpo: "PASS"

        - name: "Report planned failover test result"
          ansible.builtin.debug:
            msg: |
              ============================================
              PLANNED FAILOVER TEST RESULT: PASS
              ============================================
              DR clones created: {{ planned_cloned_keep_vms | length }} (excluded: {{ planned_cloned_exclude_vms | length }})
              Source VMs: SHUTOFF ✓
              Shutdown snapshot detected on DR targets ✓
              ============================================

      rescue:
        - name: "Record planned failover failure"
          ansible.builtin.set_fact:
            result_planned_failover: "{{ result_planned_failover if result_planned_failover == 'PASS' else 'FAIL' }}"
            result_planned_zero_rpo: "{{ result_planned_zero_rpo if result_planned_zero_rpo == 'PASS' else 'FAIL' }}"
        - name: "Re-raise planned failover test failure"
          ansible.builtin.fail:
            msg: "Planned failover test FAILED. See output above."

      always:
        - name: "Power on source VMs after planned failover test (they were shut down)"
          scale_computing.hypercore.vm_params:
            vm_name: "{{ item }}"
            power_state: start
            cluster_instance:
              host: "https://{{ groups['source'][0] }}"
              username: "{{ hostvars[groups['source'][0]]['scale_user'] | default('admin') }}"
              password: "{{ hostvars[groups['source'][0]]['scale_pass'] | default('admin') }}"
          loop:
            - "{{ source_vm_prefix }}-keep"
            - "{{ source_vm_prefix }}-exclude"
          ignore_errors: true


- name: "DR failover live integration test - cleanup source test VMs"
  hosts: source
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"

  tasks:
    - name: "Discover all VMs on source cluster"
      scale_computing.hypercore.vm_info:
      register: all_source_vms

    - name: "Remove source test VMs"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.vm_name }}"
        state: absent
      loop: "{{ all_source_vms.records | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$') | list }}"
      when: all_source_vms.records is defined

- name: "DR failover live integration test - cleanup DR test VMs"
  hosts: dr
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://{{ inventory_hostname }}"
    SC_USERNAME: "{{ scale_user | default('admin') }}"
    SC_PASSWORD: "{{ scale_pass | default('admin') }}"

  vars:
    source_vm_prefix: "dr-live-test"

  tasks:
    - name: "Wait a moment for source cleanup to fully propagate"
      ansible.builtin.pause:
        seconds: 10

    - name: "Discover all VMs on DR cluster for cleanup"
      scale_computing.hypercore.vm_info:
      register: all_dr_vms

    - name: "Clean up DR cloned VMs (with -DR suffix)"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.vm_name }}"
        state: absent
      loop: "{{ all_dr_vms.records | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*-DR$') | list }}"
      when: all_dr_vms.records is defined

    - name: "Clean up replication target VMs on DR cluster (without -DR suffix)"
      scale_computing.hypercore.vm:
        vm_name: "{{ item.vm_name }}"
        state: absent
      loop: "{{ all_dr_vms.records | selectattr('vm_name', 'match', '^' + source_vm_prefix + '.*$') | rejectattr('vm_name', 'match', '.*-DR$') | list }}"
      when: all_dr_vms.records is defined

- name: "DR failover live integration test - final summary"
  hosts: dr
  connection: local
  gather_facts: false

  tasks:
    - name: "Print final test summary"
      ansible.builtin.debug:
        msg: |
          ============================================================
          DR FAILOVER LIVE TEST — FINAL SUMMARY
          ============================================================
          Guard check (no-op while source online):    {{ result_guard_check      | default('NOT RUN') }}
          Emergency failover (clone + power on):      {{ result_failover         | default('NOT RUN') }}
          Idempotency (re-run must be no-op):         {{ result_idempotency      | default('NOT RUN') }}
          Planned failover (source shutdown + clone): {{ result_planned_failover | default('NOT RUN') }}
          Zero-RPO assertion (shutdown snapshot):     {{ result_planned_zero_rpo | default('NOT RUN') }}
          ------------------------------------------------------------
          Overall: {{ 'PASS' if (
            result_guard_check      | default('') == 'PASS' and
            result_failover         | default('') == 'PASS' and
            result_idempotency      | default('') == 'PASS' and
            result_planned_failover | default('') == 'PASS' and
            result_planned_zero_rpo | default('') == 'PASS'
          ) else 'FAIL' }}
          ============================================================

    - name: "Fail play if any test phase failed"
      ansible.builtin.fail:
        msg: "One or more test phases failed. See summary above."
      when: >-
        result_guard_check      | default('') != 'PASS' or
        result_failover         | default('') != 'PASS' or
        result_idempotency      | default('') != 'PASS' or
        result_planned_failover | default('') != 'PASS' or
        result_planned_zero_rpo | default('') != 'PASS'

