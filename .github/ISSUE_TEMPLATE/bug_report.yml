name: Bug report
description: Report a problem with the DR failover playbook
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as possible. Sanitize any passwords or sensitive IP addresses before submitting.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Run playbook with these variables: ...
        2. Observed output: ...
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Playbook output
      description: Paste the relevant playbook output (sanitize passwords and IPs as needed)
      render: text

  - type: input
    id: icos_version
    attributes:
      label: HyperCore ICOS version
      placeholder: "e.g. 9.4.1"
    validations:
      required: true

  - type: input
    id: collection_version
    attributes:
      label: scale_computing.hypercore collection version
      description: "`ansible-galaxy collection list scale_computing.hypercore`"
      placeholder: "e.g. 1.3.0"
    validations:
      required: true

  - type: input
    id: ansible_version
    attributes:
      label: Ansible version
      description: "`ansible --version`"
      placeholder: "e.g. ansible-core 2.16.0"
    validations:
      required: true
