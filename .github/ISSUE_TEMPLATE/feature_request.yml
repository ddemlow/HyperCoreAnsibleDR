name: Feature request
description: Suggest an enhancement to the DR failover playbook
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or gap this feature would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: checkboxes
    id: known_limitations
    attributes:
      label: Is this related to a known limitation?
      description: Known limitations are documented in README.md
      options:
        - label: VM startup ordering
        - label: VM-to-source-cluster mapping (multiple source clusters)
        - label: Graceful failover (zero data loss)
        - label: Failback automation
        - label: Post-failover health checks
        - label: Other / new limitation
